<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador de Toma de Requerimientos</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎭</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-primary: #FAFAF8;
        --bg-secondary: #F2F0EC;
        --bg-surface: #FFFFFF;
        --bg-deep: #1C1C1E;
        --text-primary: #1A1A1A;
        --text-secondary: #5C5C5C;
        --text-muted: #9A9A96;
        --text-inverse: #FAFAF8;
        --accent: #C45D3E;
        --accent-light: #E8A892;
        --accent-subtle: #FDF0EC;
        --success: #3A8A5C;
        --success-bg: #EDF5F0;
        --warning: #C4873E;
        --warning-bg: #FDF5EC;
        --danger: #B83A3A;
        --danger-bg: #FDECEC;
        --border: #E5E3DF;
        --border-strong: #D0CDC6;
        --shadow-sm: 0 1px 3px rgba(26,26,26,0.06);
        --shadow-md: 0 4px 12px rgba(26,26,26,0.08);
        --shadow-lg: 0 8px 30px rgba(26,26,26,0.10);
        --shadow-xl: 0 16px 50px rgba(26,26,26,0.12);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'DM Sans', sans-serif; color: var(--text-primary); }

      @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes dotPulse {
        0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
        40% { opacity: 1; transform: scale(1); }
      }
      @keyframes pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(184,58,58,0.35); }
        50% { box-shadow: 0 0 0 16px rgba(184,58,58,0); }
      }
      @keyframes slideInMessage {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes arcDraw {
        from { stroke-dashoffset: 565; }
        to { stroke-dashoffset: var(--arc-target); }
      }
      @keyframes toastSlideIn {
        0% { opacity: 0; transform: translateX(80px) scale(0.9); }
        60% { opacity: 1; transform: translateX(-4px) scale(1.02); }
        100% { opacity: 1; transform: translateX(0) scale(1); }
      }
      @keyframes toastSlideOut {
        0% { opacity: 1; transform: translateX(0) scale(1); }
        100% { opacity: 0; transform: translateX(80px) scale(0.9); }
      }
      @keyframes confettiPop {
        0% { transform: scale(0) rotate(0deg); opacity: 1; }
        50% { transform: scale(1.4) rotate(180deg); opacity: 0.8; }
        100% { transform: scale(0) rotate(360deg); opacity: 0; }
      }
      @keyframes confettiFall {
        0% { transform: translateY(0) rotate(0deg); opacity: 1; }
        100% { transform: translateY(30px) rotate(360deg); opacity: 0; }
      }
      @keyframes overlayFadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes overlayContentIn {
        0% { opacity: 0; transform: scale(0.85) translateY(20px); }
        60% { opacity: 1; transform: scale(1.02) translateY(-2px); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* ── Mobile responsive ──────────────────── */
      @media (max-width: 768px) {
        .eval-grid { grid-template-columns: 1fr !important; }
        .eval-right { order: -1; }
        .how-it-works { grid-template-columns: 1fr !important; gap: 8px !important; }
        .chat-header-actions { gap: 4px !important; }
        .chat-header-actions .eval-btn-text { display: none; }
        .session-banner { padding: 20px 16px !important; }
        .session-banner .timer-big { font-size: 36px !important; }
      }
      @media (max-width: 480px) {
        .persona-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 10px !important; }
        .select-header h1 { font-size: 30px !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
