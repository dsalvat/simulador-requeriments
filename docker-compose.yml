services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: simulador
      POSTGRES_USER: simulador
      POSTGRES_PASSWORD: simulador
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./db/migrate_001_orgs_formations.sql:/docker-entrypoint-initdb.d/02-orgs-formations.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simulador"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: postgresql://simulador:simulador@db:5432/simulador
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
